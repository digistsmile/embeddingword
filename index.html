<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Embedding Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e222c;
    --border: #2a2f3d;
    --border2: #353b4d;
    --accent: #4f8ef7;
    --accent2: #7b5cf7;
    --green: #2dd4a0;
    --amber: #f5a623;
    --red: #f76f6f;
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555c70;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }
 
  /* --- Layout --- */
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
 
  /* --- Sidebar --- */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .logo p { font-size: 11px; color: var(--text3); font-family: var(--mono); }
 
  .section-title {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px;
  }
 
  .model-list { display: flex; flex-direction: column; gap: 6px; }
  .model-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
  }
  .model-item:hover { border-color: var(--border2); background: var(--surface2); }
  .model-item.selected {
    border-color: var(--accent);
    background: rgba(79,142,247,0.07);
  }
  .model-check {
    width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .model-item.selected .model-check {
    background: var(--accent); border-color: var(--accent);
  }
  .model-check svg { display: none; }
  .model-item.selected .model-check svg { display: block; }
  .model-info { flex: 1; min-width: 0; }
  .model-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; word-break: break-all; }
  .model-dim { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
 
  .select-all-btn {
    font-size: 11px; color: var(--accent);
    background: none; border: none; cursor: pointer;
    text-align: left; padding: 0; font-family: var(--sans);
  }
  .select-all-btn:hover { text-decoration: underline; }
 
  /* --- Main --- */
  .main { padding: 32px 36px; display: flex; flex-direction: column; gap: 28px; }
 
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
  }
  .panel-title {
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title span {
    width: 4px; height: 14px; border-radius: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    display: inline-block;
  }
 
  .formula-display {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }
  .formula-display .hi { color: var(--accent); }
  .formula-display .op { color: var(--text3); }
 
  .word-inputs { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .op-symbol { font-family: var(--mono); font-size: 20px; color: var(--text3); text-align: center; }
  .input-wrap label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 4px; letter-spacing: 0.05em; font-weight: 500; }
  input[type=text] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--text3); }
 
  .candidates-wrap { display: flex; flex-direction: column; gap: 6px; }
  .candidates-wrap label { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; font-weight: 500; }
  .cand-input-row { display: flex; gap: 8px; align-items: center; }
  .cand-input-row input { flex: 1; }
  .hint-text { font-size: 11px; color: var(--text3); }
 
  .run-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    font-family: var(--sans);
    transition: opacity 0.15s, transform 0.1s;
  }
  .run-btn:hover { opacity: 0.9; }
  .run-btn:active { transform: scale(0.99); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
 
  /* --- Results --- */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .tab-group { display:  flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .tab {
    font-size: 12px; font-weight: 500;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer; border: none; background: none;
    color: var(--text2); font-family: var(--sans);
    transition: all 0.15s;
  }
  .tab.active { background: var(--surface2); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }
 
  .result-grid { display: grid; gap: 14px; }
  .result-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .result-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .result-card-model { font-size: 12px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .status-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    font-weight: 600; font-family: var(--mono);
  }
  .badge-ok { background: rgba(45,212,160,0.15); color: var(--green); }
  .badge-err { background: rgba(247,111,111,0.15); color: var(--red); }
  .badge-loading { background: rgba(79,142,247,0.15); color: var(--accent); }
 
  .result-bars { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-word { font-family: var(--mono); font-size: 12px; color: var(--text2); width: 100px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .bar-score { font-family: var(--mono); font-size: 12px; color: var(--text2); width: 52px; text-align: right; flex-shrink: 0; }
  .bar-rank {
    width: 18px; font-size: 10px; font-weight: 700;
    font-family: var(--mono); color: var(--text3); flex-shrink: 0; text-align: right;
  }
  .bar-rank.r1 { color: var(--amber); }
  .bar-rank.r2 { color: var(--text2); }
  .bar-rank.r3 { color: var(--text3); }
 
  /* Compare table */
  .compare-wrap { overflow-x: auto; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .compare-table th {
    padding: 10px 12px; text-align: left;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    color: var(--text3); border-bottom: 1px solid var(--border);
    white-space: nowrap; background: var(--surface2);
  }
  .compare-table td {
    padding: 9px 12px; border-bottom: 1px solid var(--border);
    color: var(--text2); font-family: var(--mono); font-size: 12px;
  }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: var(--surface2); }
  .score-chip {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .chip-1 { background: rgba(245,166,35,0.18); color: var(--amber); }
  .chip-2 { background: rgba(45,212,160,0.13); color: var(--green); }
  .chip-3 { background: rgba(79,142,247,0.13); color: var(--accent); }
  .chip-n { background: var(--surface2); color: var(--text3); }
 
  .empty-state { padding: 48px 24px; text-align: center; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }
 
  .api-note {
    background: rgba(79,142,247,0.07);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 12px; color: var(--text2);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .api-note .icon { color: var(--accent); flex-shrink: 0; }
 
  .error-msg {
    padding: 10px 14px; font-size: 12px; color: var(--red);
    font-family: var(--mono); background: rgba(247,111,111,0.07);
    margin: 10px 16px; border-radius: 6px;
  }
 
  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
 
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>Embedding Tester</h1>
        <p>Vector Arithmetic Lab</p>
      </div>
    </div>
 
    <div>
      <div class="section-title">모델 선택</div>
      <button class="select-all-btn" onclick="toggleAll()" style="margin-bottom:10px" id="selectAllBtn">전체 선택</button>
      <div class="model-list" id="modelList"></div>
    </div>
 
    <div style="margin-top:auto;">
      <div class="api-note">
        <span class="icon">ℹ</span>
        <span>Hugging Face Inference API 사용. 첫 요청 시 모델 로딩으로 20~40초 걸릴 수 있습니다.</span>
      </div>
    </div>
  </aside>
 
  <!-- Main -->
  <main class="main">
 
    <!-- Config Panel -->
    <div class="panel">
      <div class="panel-title"><span></span>벡터 연산 설정</div>
 
      <div class="formula-display" id="formulaDisplay">
        <span class="hi" id="fA">king</span>
        <span class="op"> − </span>
        <span class="hi" id="fB">man</span>
        <span class="op"> + </span>
        <span class="hi" id="fC">woman</span>
        <span class="op"> ≈ ?</span>
      </div>
 
      <div class="word-inputs">
        <div class="input-wrap">
          <label>기준 단어 (A)</label>
          <input type="text" id="wordA" value="king" oninput="updateFormula()" />
        </div>
        <div class="op-symbol">−</div>
        <div class="input-wrap">
          <label>빼는 단어 (B)</label>
          <input type="text" id="wordB" value="man" oninput="updateFormula()" />
        </div>
        <div class="op-symbol">+</div>
        <div class="input-wrap">
          <label>더하는 단어 (C)</label>
          <input type="text" id="wordC" value="woman" oninput="updateFormula()" />
        </div>
      </div>
    </div>
 
    <!-- Candidates Panel -->
    <div class="panel">
      <div class="panel-title"><span></span>후보 단어 목록</div>
      <div class="candidates-wrap">
        <label>단어 목록 (쉼표로 구분)</label>
        <input type="text" id="candidates" value="king,queen,monarch,princess,royal,empress,dog,car,computer,dgist,aprl" />
        <div class="hint-text">예: king,queen,monarch,princess,royal</div>
      </div>
 
      <button class="run-btn" id="runBtn" onclick="runTest()" style="margin-top:16px">
        ▶ 선택한 모델로 실행
      </button>
    </div>
 
    <!-- Results Panel -->
    <div class="panel">
      <div class="results-header">
        <div class="panel-title" style="margin-bottom:0"><span></span>결과</div>
        <div class="tab-group" id="tabGroup" style="display:none">
          <button class="tab active" onclick="showTab('individual', this)">개별 결과</button>
          <button class="tab" onclick="showTab('compare', this)">비교 보기</button>
        </div>
      </div>
 
      <div id="resultsContent">
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <p>모델을 선택하고 실행 버튼을 눌러주세요.</p>
        </div>
      </div>
    </div>
  </main>
</div>
 
<script>
const MODELS = [
  { id: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2", name: "paraphrase-multilingual-MiniLM-L12-v2", dim: "multilingual · 384d" },
  { id: "sentence-transformers/LaBSE",                                  name: "LaBSE",                                  dim: "multilingual · 768d" },
  { id: "sentence-transformers/all-mpnet-base-v2",                      name: "all-mpnet-base-v2",                      dim: "english · 768d" },
  { id: "sentence-transformers/paraphrase-MiniLM-L6-v2",               name: "paraphrase-MiniLM-L6-v2",               dim: "english · 384d" },
  { id: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1",             name: "multi-qa-MiniLM-L6-cos-v1",             dim: "english · 384d" },
  { id: "sentence-transformers/distilbert-base-nli-stsb-mean-tokens",  name: "distilbert-base-nli-stsb-mean-tokens",  dim: "english · 768d" },
  { id: "BAAI/bge-large-en-v1.5",                                       name: "BAAI/bge-large-en-v1.5",                dim: "english · 1024d" },
];
 
let selectedModels = new Set(["sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"]);
let allResults = {};
let currentTab = "individual";
 
function renderModelList() {
  const list = document.getElementById("modelList");
  list.innerHTML = MODELS.map(m => `
    <div class="model-item ${selectedModels.has(m.id) ? 'selected' : ''}" onclick="toggleModel('${m.id}')">
      <div class="model-check">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="model-info">
        <div class="model-name">${m.name}</div>
        <div class="model-dim">${m.dim}</div>
      </div>
    </div>
  `).join("");
 
  const btn = document.getElementById("selectAllBtn");
  btn.textContent = selectedModels.size === MODELS.length ? "전체 해제" : "전체 선택";
}
 
function toggleModel(id) {
  selectedModels.has(id) ? selectedModels.delete(id) : selectedModels.add(id);
  renderModelList();
}
 
function toggleAll() {
  if (selectedModels.size === MODELS.length) selectedModels.clear();
  else MODELS.forEach(m => selectedModels.add(m.id));
  renderModelList();
}
 
function updateFormula() {
  const a = document.getElementById("wordA").value || "A";
  const b = document.getElementById("wordB").value || "B";
  const c = document.getElementById("wordC").value || "C";
  document.getElementById("fA").textContent = a;
  document.getElementById("fB").textContent = b;
  document.getElementById("fC").textContent = c;
}
 
function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-10);
}
 
function normalize(v) {
  let n = Math.sqrt(v.reduce((s, x) => s + x*x, 0)) + 1e-10;
  return v.map(x => x/n);
}
 
async function getEmbedding(modelId, text) {
  const res = await fetch(`https://api-inference.huggingface.co/models/${modelId}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ inputs: text, options: { wait_for_model: true } })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  if (Array.isArray(data[0]) && Array.isArray(data[0][0])) {
    // Mean pooling for token-level embeddings
    const tokens = data[0];
    const dim = tokens[0].length;
    return tokens.reduce((acc, t) => acc.map((v, i) => v + t[i] / tokens.length), new Array(dim).fill(0));
  }
  if (Array.isArray(data) && Array.isArray(data[0])) return data[0];
  if (Array.isArray(data)) return data;
  throw new Error("Unexpected format");
}
 
const BAR_COLORS = [
  "linear-gradient(90deg,#f5a623,#f7d185)",
  "linear-gradient(90deg,#2dd4a0,#7be8cc)",
  "linear-gradient(90deg,#4f8ef7,#92beff)",
  "linear-gradient(90deg,#7b5cf7,#b49bff)",
  "linear-gradient(90deg,#f76f6f,#ffaaaa)",
];
 
function buildBarView(results) {
  const mids = Object.keys(results);
  return mids.map(mid => {
    const r = results[mid];
    const mname = MODELS.find(m => m.id === mid)?.name || mid;
    if (r.error) {
      return `<div class="result-card">
        <div class="result-card-header">
          <span class="result-card-model">${mname}</span>
          <span class="status-badge badge-err">ERROR</span>
        </div>
        <div class="error-msg">${r.error}</div>
      </div>`;
    }
    const sorted = [...r.scores].sort((a, b) => b.score - a.score);
    const maxScore = sorted[0]?.score || 1;
    const bars = sorted.map((item, i) => {
      const pct = Math.max(2, (item.score / maxScore) * 100).toFixed(1);
      const color = BAR_COLORS[Math.min(i, BAR_COLORS.length - 1)];
      const rankClass = i === 0 ? "r1" : i === 1 ? "r2" : "r3";
      return `<div class="bar-row">
        <div class="bar-rank ${rankClass}">${i+1}</div>
        <div class="bar-word">${item.word}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="bar-score">${item.score.toFixed(4)}</div>
      </div>`;
    }).join("");
    return `<div class="result-card">
      <div class="result-card-header">
        <span class="result-card-model">${mname}</span>
        <span class="status-badge badge-ok">OK</span>
      </div>
      <div class="result-bars">${bars}</div>
    </div>`;
  }).join("");
}
 
function buildCompareView(results) {
  const mids = Object.keys(results).filter(mid => !results[mid].error);
  if (mids.length < 2) return `<p style="color:var(--text3);font-size:13px;padding:12px 0">비교를 위해 2개 이상의 모델을 실행하세요.</p>`;
  const allWords = [...new Set(mids.flatMap(mid => (results[mid].scores || []).map(s => s.word)))];
  const shortName = id => MODELS.find(m => m.id === id)?.name.split('-').slice(0,3).join('-') || id;
 
  let html = `<div class="compare-wrap"><table class="compare-table"><thead><tr>
    <th>단어</th>${mids.map(mid => `<th>${shortName(mid)}</th>`).join("")}
  </tr></thead><tbody>`;
 
  for (const word of allWords) {
    const entries = mids.map(mid => {
      const sc = (results[mid].scores || []).find(s => s.word === word);
      return sc ? sc.score : null;
    });
    html += `<tr><td style="color:var(--text);font-weight:500">${word}</td>`;
    entries.forEach((sc, i) => {
      if (sc === null) { html += `<td>—</td>`; return; }
      const rank = [...(results[mids[i]].scores || [])].sort((a,b)=>b.score-a.score).findIndex(s=>s.word===word);
      const cls = rank===0?"chip-1":rank===1?"chip-2":rank===2?"chip-3":"chip-n";
      html += `<td><span class="score-chip ${cls}">${sc.toFixed(4)}</span></td>`;
    });
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}
 
function renderResults() {
  const content = document.getElementById("resultsContent");
  const tabGroup = document.getElementById("tabGroup");
  const mids = Object.keys(allResults);
  if (mids.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">◎</div><p>모델을 선택하고 실행 버튼을 눌러주세요.</p></div>`;
    tabGroup.style.display = "none";
    return;
  }
  tabGroup.style.display = mids.length > 1 ? "flex" : "none";
 
  if (currentTab === "individual") {
    content.innerHTML = `<div class="result-grid">${buildBarView(allResults)}</div>`;
  } else {
    content.innerHTML = buildCompareView(allResults);
  }
}
 
function showTab(name, el) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderResults();
}
 
async function runTest() {
  if (selectedModels.size === 0) { alert("모델을 하나 이상 선택하세요."); return; }
  const wordA = document.getElementById("wordA").value.trim();
  const wordB = document.getElementById("wordB").value.trim();
  const wordC = document.getElementById("wordC").value.trim();
  const cands = document.getElementById("candidates").value.split(",").map(s => s.trim()).filter(Boolean);
  if (!wordA || !wordB || !wordC || cands.length === 0) { alert("단어와 후보 목록을 모두 입력하세요."); return; }
 
  const btn = document.getElementById("runBtn");
  btn.disabled = true; btn.textContent = "⏳ 실행 중...";
  allResults = {};
  currentTab = "individual";
 
  const content = document.getElementById("resultsContent");
  const mids = [...selectedModels];
 
  content.innerHTML = `<div class="empty-state"><div class="empty-icon" style="animation:spin 1s linear infinite">◌</div><p>${mids.length}개 모델 임베딩 계산 중... (첫 실행 시 시간이 걸릴 수 있습니다)</p></div>`;
 
  await Promise.all(mids.map(async mid => {
    try {
      const [eA, eB, eC, ...eCands] = await Promise.all([
        getEmbedding(mid, wordA),
        getEmbedding(mid, wordB),
        getEmbedding(mid, wordC),
        ...cands.map(c => getEmbedding(mid, c))
      ]);
      const query = normalize(eA.map((v, i) => v - eB[i] + eC[i]));
      const scores = cands.map((word, i) => ({ word, score: cosineSim(query, normalize(eCands[i])) }));
      allResults[mid] = { scores };
    } catch(e) {
      allResults[mid] = { error: e.message };
    }
  }));
 
  btn.disabled = false; btn.textContent = "▶ 선택한 모델로 실행";
  renderResults();
}
 
// init
renderModelList();
updateFormula();
</script>
<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
