<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Embedding Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Noto+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --paper:#fdf8f0;
  --paper2:#f7f0e3;
  --paper3:#efe6d4;
  --ink:#2c2416;
  --ink2:#6b5e48;
  --ink3:#a89880;
  --rule:#ddd0b8;
  --red:#c0392b;
  --blue:#2563a8;
  --green:#1a7a4a;
  --amber:#b45309;
  --purple:#6d28d9;
  --teal:#0f766e;
  --accent:#c0392b;
  --shadow:rgba(44,36,22,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8dfc8;font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,#c8bfae 31px,#c8bfae 32px);
}

/* ── Layout ─────────────────────────── */
.wrap{display:grid;grid-template-columns:300px 1fr;min-height:100vh;gap:0}

/* ── Sidebar (index card style) ──────── */
.sidebar{
  background:var(--paper);
  border-right:3px solid var(--rule);
  padding:24px 20px;
  display:flex;flex-direction:column;gap:20px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  box-shadow:4px 0 12px var(--shadow);
}
.sidebar-top{border-bottom:2px solid var(--rule);padding-bottom:16px}
.logo-title{
  font-family:'Caveat',cursive;font-size:26px;font-weight:700;
  color:var(--red);letter-spacing:-0.5px;line-height:1.1;
}
.logo-sub{font-size:11px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}

.sec-label{
  font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--rule)}

.sel-all{
  font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;padding:0;margin-bottom:6px;display:block;
}
.sel-all:hover{text-decoration:underline}

.model-list{display:flex;flex-direction:column;gap:5px}
.model-card{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 10px;border-radius:6px;cursor:pointer;
  border:1.5px solid transparent;transition:all .15s;
  background:var(--paper2);
}
.model-card:hover{border-color:var(--rule);background:var(--paper3)}
.model-card.sel{border-color:var(--red);background:#fdf0ee}
.model-card.m-ok{border-color:var(--green);background:#f0faf4}
.model-card.m-load{border-color:var(--amber);background:#fef9ee}
.model-card.m-err{border-color:var(--red);background:#fef2f2}
.chk{
  width:14px;height:14px;border-radius:3px;border:1.5px solid var(--rule);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:white;
}
.model-card.sel .chk,.model-card.m-ok .chk{background:var(--green);border-color:var(--green)}
.model-card.m-load .chk{background:var(--amber);border-color:var(--amber)}
.model-card.m-err .chk{background:var(--red);border-color:var(--red)}
.chk-mark{display:none;color:white;font-size:9px;font-weight:700}
.model-card.sel .chk-mark,.model-card.m-ok .chk-mark,.model-card.m-load .chk-mark,.model-card.m-err .chk-mark{display:block}
.mname{font-size:11.5px;font-weight:500;color:var(--ink);line-height:1.3;word-break:break-all}
.mdim{font-size:10px;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.mstatus{font-size:10px;margin-top:1px;font-family:'JetBrains Mono',monospace}
.s-ok{color:var(--green)}.s-load{color:var(--amber)}.s-err{color:var(--red)}

.note-box{
  background:var(--paper2);border:1.5px dashed var(--rule);border-radius:8px;
  padding:10px 12px;font-size:11.5px;color:var(--ink2);line-height:1.6;
  margin-top:auto;
}
.note-box strong{color:var(--ink);font-weight:600}

/* ── Main ────────────────────────────── */
.main{padding:28px 32px;display:flex;flex-direction:column;gap:24px}

/* notebook page */
.page{
  background:var(--paper);
  border-radius:4px;
  box-shadow:2px 3px 10px var(--shadow),0 1px 3px var(--shadow);
  padding:24px 28px;
  position:relative;
  /* ruled lines */
  background-image:
    linear-gradient(var(--paper) 0px,var(--paper) 27px,var(--rule) 28px);
  background-size:100% 28px;
}
.page::before{
  content:'';position:absolute;left:56px;top:0;bottom:0;
  width:1.5px;background:#e8c4c4;opacity:.6;
}
.page-title{
  font-family:'Caveat',cursive;font-size:22px;font-weight:700;
  color:var(--ink);margin-bottom:16px;padding-left:68px;
  position:relative;z-index:1;
}
.page-title span{color:var(--red)}
.page-body{padding-left:68px;position:relative;z-index:1}

/* formula row */
.formula-strip{
  display:flex;align-items:center;gap:0;
  background:var(--paper2);border:1.5px solid var(--rule);
  border-radius:8px;padding:10px 16px;margin-bottom:18px;
  font-family:'Caveat',cursive;font-size:20px;color:var(--ink2);
}
.formula-strip .hw{color:var(--red);font-weight:700;font-size:22px}
.formula-strip .op{color:var(--ink3);margin:0 8px;font-size:18px}

.fields{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:8px;align-items:end;margin-bottom:0}
.field label{
  font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink3);display:block;margin-bottom:4px;
}
.opsym{font-family:'Caveat',cursive;font-size:26px;color:var(--rule);text-align:center;padding-bottom:2px}
input[type=text]{
  width:100%;background:white;
  border:1.5px solid var(--rule);border-radius:6px;
  color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:13px;
  padding:8px 10px;outline:none;transition:border-color .15s;
}
input[type=text]:focus{border-color:var(--red)}
input[type=text]::placeholder{color:var(--ink3)}

.hint{font-size:11px;color:var(--ink3);margin-top:5px}

/* run button */
.run-btn{
  background:var(--red);color:white;border:none;border-radius:8px;
  padding:11px 0;font-size:14px;font-weight:600;width:100%;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;margin-top:16px;
  transition:background .15s,transform .1s;letter-spacing:.02em;
  position:relative;z-index:1;
}
.run-btn:hover:not(:disabled){background:#9b2226}
.run-btn:active:not(:disabled){transform:scale(.99)}
.run-btn:disabled{background:var(--ink3);cursor:not-allowed}

/* progress */
.prog-wrap{margin-top:10px;display:none;position:relative;z-index:1}
.prog-bg{background:var(--paper3);border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--amber));border-radius:4px;transition:width .3s}
.prog-txt{font-size:11px;color:var(--ink2);font-family:'JetBrains Mono',monospace;margin-top:5px}

/* tabs */
.tab-row{display:flex;gap:0;border-bottom:2px solid var(--rule);margin-bottom:18px;position:relative;z-index:1}
.tab-btn{
  font-size:12px;font-weight:600;padding:7px 18px;
  background:none;border:none;cursor:pointer;color:var(--ink3);
  font-family:'Noto Sans KR',sans-serif;border-bottom:2.5px solid transparent;
  margin-bottom:-2px;transition:all .15s;
}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-btn:hover:not(.active){color:var(--ink)}

/* result cards */
.result-grid{display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}
.rcard{
  background:white;border:1.5px solid var(--rule);border-radius:8px;overflow:hidden;
}
.rcard-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--paper2);border-bottom:1.5px solid var(--rule);
}
.rcard-model{font-size:12px;font-weight:600;color:var(--ink);font-family:'JetBrains Mono',monospace}
.badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600}
.b-ok{background:#dcfce7;color:#166534}
.b-err{background:#fee2e2;color:#991b1b}
.b-load{background:#fef9c3;color:#854d0e}

.bars{padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.brow{display:flex;align-items:center;gap:8px}
.brank{width:16px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ink3);flex-shrink:0;text-align:right}
.brank.r1{color:var(--red)}.brank.r2{color:var(--amber)}.brank.r3{color:var(--green)}
.bword{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2);width:90px;text-align:right;flex-shrink:0}
.btrack{flex:1;height:20px;background:var(--paper3);border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bscore{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2);width:52px;text-align:right;flex-shrink:0}
.err-msg{padding:10px 14px;font-size:12px;color:var(--red);font-family:'JetBrains Mono',monospace;background:#fef2f2;margin:10px 14px;border-radius:6px}

/* compare table */
.tbl-wrap{overflow-x:auto;position:relative;z-index:1}
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th{padding:9px 12px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:2px solid var(--rule);white-space:nowrap;background:var(--paper2)}
.ctbl td{padding:8px 12px;border-bottom:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:12px}
.ctbl tr:last-child td{border-bottom:none}
.ctbl tr:hover td{background:var(--paper2)}
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.c1{background:#fde8e8;color:#9b2226}.c2{background:#fef3cd;color:#854d0e}.c3{background:#d1fae5;color:#065f46}.cn{background:var(--paper3);color:var(--ink3)}

/* heatmap */
.hmap-wrap{overflow-x:auto;position:relative;z-index:1}
.hmap-title{font-family:'Caveat',cursive;font-size:16px;color:var(--ink2);margin-bottom:10px}
.hmap-table{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11px}
.hmap-table th{padding:5px 8px;color:var(--ink2);font-weight:500;text-align:center;font-size:11px;white-space:nowrap}
.hmap-table th.row-header{text-align:right;min-width:80px}
.hmap-table td{width:54px;height:38px;text-align:center;border:1px solid rgba(255,255,255,.4);font-size:11px;font-weight:500;cursor:default;transition:opacity .15s}
.hmap-table td:hover{opacity:.8;outline:2px solid var(--ink)}
.hmap-sel{font-family:'Caveat',cursive;font-size:14px;color:var(--ink2);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hmap-sel label{font-size:11px;color:var(--ink3)}
.hmap-sel select{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  border:1.5px solid var(--rule);border-radius:6px;padding:4px 8px;
  background:white;color:var(--ink);outline:none;cursor:pointer;
}

.empty-state{padding:40px 0;text-align:center;color:var(--ink3)}
.empty-hand{font-family:'Caveat',cursive;font-size:20px;color:var(--ink3);display:block;margin-bottom:6px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinning{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="wrap">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="logo-title">📖 Embedding<br>Lab</div>
    <div class="logo-sub">vector arithmetic · similarity</div>
  </div>

  <div>
    <div class="sec-label">모델 선택</div>
    <button class="sel-all" id="selAllBtn" onclick="toggleAll()">전체 선택</button>
    <div class="model-list" id="modelList"></div>
  </div>

  <div class="note-box">
    <strong>📝 Note</strong><br>
    Transformers.js로 브라우저에서 직접 실행됩니다.<br>
    첫 실행 시 모델 다운로드로 수 분이 걸릴 수 있습니다.
  </div>
</aside>

<!-- Main -->
<main class="main">

  <!-- 설정 페이지 -->
  <div class="page">
    <div class="page-title">① <span>벡터 연산</span> 설정</div>
    <div class="page-body">
      <div class="formula-strip">
        <span class="hw" id="fA">king</span>
        <span class="op">−</span>
        <span class="hw" id="fB">man</span>
        <span class="op">+</span>
        <span class="hw" id="fC">woman</span>
        <span class="op" style="margin-left:4px">≈ ?</span>
      </div>
      <div class="fields">
        <div class="field"><label>기준 단어 A</label><input type="text" id="wordA" value="king" oninput="updateFormula()"/></div>
        <div class="opsym">−</div>
        <div class="field"><label>빼는 단어 B</label><input type="text" id="wordB" value="man" oninput="updateFormula()"/></div>
        <div class="opsym">+</div>
        <div class="field"><label>더하는 단어 C</label><input type="text" id="wordC" value="woman" oninput="updateFormula()"/></div>
      </div>
    </div>
  </div>

  <!-- 후보 단어 + 실행 -->
  <div class="page">
    <div class="page-title">② <span>후보 단어</span> 입력 &amp; 실행</div>
    <div class="page-body">
      <div class="field" style="margin-bottom:0">
        <label>후보 단어 목록 (쉼표로 구분)</label>
        <input type="text" id="candidates" value="king,queen,monarch,princess,royal,empress,dog,car,computer"/>
      </div>
      <div class="hint">예: king,queen,monarch,princess — 결과 비교 및 히트맵에 사용됩니다</div>
      <button class="run-btn" id="runBtn" onclick="runTest()">▶ 선택한 모델로 실행</button>
      <div class="prog-wrap" id="progWrap">
        <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        <div class="prog-txt" id="progTxt"></div>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div class="page" id="resultPage">
    <div class="page-title">③ <span>결과</span></div>
    <div class="page-body">
      <div class="tab-row" id="tabRow" style="display:none">
        <button class="tab-btn active" onclick="showTab('bar',this)">유사도 순위</button>
        <button class="tab-btn" onclick="showTab('compare',this)">모델 비교</button>
        <button class="tab-btn" onclick="showTab('heatmap',this)">히트맵</button>
      </div>
      <div id="resultContent">
        <div class="empty-state">
          <span class="empty-hand">✏️ 아직 결과가 없어요</span>
          모델을 선택하고 실행 버튼을 눌러주세요.
        </div>
      </div>
    </div>
  </div>

</main>
</div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';
env.allowLocalModels = false;
env.useBrowserCache = true;

/* ─── Models ────────────────────────────────────── */
const MODELS = [
  {id:'Xenova/paraphrase-multilingual-MiniLM-L12-v2', label:'paraphrase-multilingual-MiniLM-L12-v2', dim:'multilingual · 384d'},
  {id:'Xenova/LaBSE',                                  label:'LaBSE',                                  dim:'multilingual · 768d'},
  {id:'Xenova/all-mpnet-base-v2',                      label:'all-mpnet-base-v2',                      dim:'english · 768d'},
  {id:'Xenova/paraphrase-MiniLM-L6-v2',               label:'paraphrase-MiniLM-L6-v2',               dim:'english · 384d'},
  {id:'Xenova/multi-qa-MiniLM-L6-cos-v1',             label:'multi-qa-MiniLM-L6-cos-v1',             dim:'english · 384d'},
  {id:'Xenova/distilbert-base-nli-stsb-mean-tokens',  label:'distilbert-base-nli-stsb-mean-tokens',  dim:'english · 768d'},
  {id:'Xenova/bge-large-en-v1.5',                      label:'BAAI/bge-large-en-v1.5',                dim:'english · 1024d'},
];

let selected = new Set([MODELS[0].id]);
let cache = {};      // id -> extractor | 'loading' | 'error'
let results = {};    // id -> {scores:[{word,score}]} | {error}
let embedStore = {}; // id -> {word -> Float32Array}  (for heatmap)
let currentTab = 'bar';

/* ─── Render sidebar ────────────────────────────── */
function renderList(){
  document.getElementById('modelList').innerHTML = MODELS.map(m=>{
    const st = cache[m.id]==='loading'?'m-load':cache[m.id]==='error'?'m-err':cache[m.id]?'m-ok':selected.has(m.id)?'sel':'';
    const stTxt = st==='m-load'?`<div class="mstatus s-load">⏳ 로딩 중...</div>`
                 :st==='m-ok' ?`<div class="mstatus s-ok">✓ 완료</div>`
                 :st==='m-err'?`<div class="mstatus s-err">✗ 실패</div>`:'';
    const mark = (st==='sel'||st==='m-ok')?'✓':st==='m-load'?'…':st==='m-err'?'✗':'';
    return `<div class="model-card ${st}" data-id="${m.id}">
      <div class="chk"><span class="chk-mark">${mark}</span></div>
      <div>
        <div class="mname">${m.label}</div>
        <div class="mdim">${m.dim}</div>
        ${stTxt}
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.model-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id;
      selected.has(id)?selected.delete(id):selected.add(id);
      renderList();
    });
  });
  document.getElementById('selAllBtn').textContent=selected.size===MODELS.length?'전체 해제':'전체 선택';
}
window.toggleAll=()=>{
  selected.size===MODELS.length?selected.clear():MODELS.forEach(m=>selected.add(m.id));
  renderList();
};
window.updateFormula=()=>{
  document.getElementById('fA').textContent=document.getElementById('wordA').value||'A';
  document.getElementById('fB').textContent=document.getElementById('wordB').value||'B';
  document.getElementById('fC').textContent=document.getElementById('wordC').value||'C';
};

/* ─── Progress ──────────────────────────────────── */
function setProgress(pct,txt){
  document.getElementById('progWrap').style.display='block';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent=txt;
}
function hideProgress(){document.getElementById('progWrap').style.display='none';}

/* ─── Math helpers ──────────────────────────────── */
function norm(v){
  let n=0; for(let x of v) n+=x*x;
  n=Math.sqrt(n)+1e-10;
  return v.map(x=>x/n);
}
function cosine(a,b){
  let d=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-10);
}

/* ─── Embedding extraction (robust) ─────────────── */
function tensorToArray(t){
  // t.data: Float32Array  t.dims e.g. [1,seqlen,dim] or [1,dim]
  return Array.from(t.data);
}

function meanPool(data, dims){
  // dims: [batch, seq, hidden] -> mean over seq
  const [, seq, hidden] = dims;
  const out = new Array(hidden).fill(0);
  for(let s=0;s<seq;s++)
    for(let h=0;h<hidden;h++)
      out[h]+=data[s*hidden+h];
  return out.map(v=>v/seq);
}

async function getEmbedding(extractor, text){
  // Run with no special options first
  const out = await extractor(text, {pooling:'mean', normalize:true});
  // out is a Tensor with .data (Float32Array) and .dims
  const dims = out.dims; // e.g. [1,384] or [1,seq,768]
  const data = Array.from(out.data);

  if(dims.length===2){
    // [1, hidden] — already pooled
    return norm(data);
  } else if(dims.length===3){
    // [1, seq, hidden] — need to mean pool
    return norm(meanPool(data, dims));
  } else {
    // fallback: just use all data
    return norm(data);
  }
}

/* ─── Load model ────────────────────────────────── */
async function loadModel(mdef){
  if(cache[mdef.id] && cache[mdef.id]!=='error' && cache[mdef.id]!=='loading')
    return cache[mdef.id];
  cache[mdef.id]='loading'; renderList();
  try{
    const ext = await pipeline('feature-extraction', mdef.id, {
      progress_callback:(p)=>{
        if(p.status==='progress'||p.status==='downloading'){
          const pct=p.total?Math.round(p.loaded/p.total*100):0;
          setProgress(pct,`📦 ${mdef.label} 다운로드 중... ${pct}%`);
        }
      }
    });
    cache[mdef.id]=ext; renderList(); return ext;
  }catch(e){
    cache[mdef.id]='error'; renderList(); throw e;
  }
}

/* ─── Render results ─────────────────────────────── */
const BCOLORS=[
  'linear-gradient(90deg,#c0392b,#e07060)',
  'linear-gradient(90deg,#b45309,#d97706)',
  'linear-gradient(90deg,#1a7a4a,#22c55e)',
  'linear-gradient(90deg,#2563a8,#60a5fa)',
  'linear-gradient(90deg,#6d28d9,#a78bfa)',
];

function buildBar(){
  const mids=Object.keys(results);
  if(!mids.length) return emptyState();
  return `<div class="result-grid">${mids.map(mid=>{
    const r=results[mid];
    const lbl=MODELS.find(m=>m.id===mid)?.label||mid;
    if(r.error) return `<div class="rcard">
      <div class="rcard-head"><span class="rcard-model">${lbl}</span><span class="badge b-err">ERROR</span></div>
      <div class="err-msg">${r.error}</div></div>`;
    const sorted=[...r.scores].sort((a,b)=>b.score-a.score);
    const mx=sorted[0]?.score||1;
    return `<div class="rcard">
      <div class="rcard-head"><span class="rcard-model">${lbl}</span><span class="badge b-ok">OK</span></div>
      <div class="bars">${sorted.map((it,i)=>{
        const pct=Math.max(2,(it.score/mx)*100).toFixed(1);
        const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
        return `<div class="brow">
          <div class="brank ${rc}">${i+1}</div>
          <div class="bword">${it.word}</div>
          <div class="btrack"><div class="bfill" style="width:${pct}%;background:${BCOLORS[Math.min(i,4)]}"></div></div>
          <div class="bscore">${it.score.toFixed(4)}</div>
        </div>`;
      }).join('')}</div></div>`;
  }).join('')}</div>`;
}

function buildCompare(){
  const mids=Object.keys(results).filter(mid=>!results[mid].error);
  if(mids.length<2) return `<p style="color:var(--ink3);font-size:13px;padding:8px 0">비교를 위해 2개 이상의 모델을 실행하세요.</p>`;
  const words=[...new Set(mids.flatMap(mid=>(results[mid].scores||[]).map(s=>s.word)))];
  const short=id=>{ const m=MODELS.find(m=>m.id===id); return m?m.label.split('-').slice(0,3).join('-'):id; };
  return `<div class="tbl-wrap"><table class="ctbl">
    <thead><tr><th>단어</th>${mids.map(mid=>`<th>${short(mid)}</th>`).join('')}</tr></thead>
    <tbody>${words.map(w=>{
      const cells=mids.map(mid=>{
        const sc=(results[mid].scores||[]).find(s=>s.word===w);
        if(!sc) return `<td style="color:var(--ink3)">—</td>`;
        const rank=[...(results[mid].scores||[])].sort((a,b)=>b.score-a.score).findIndex(s=>s.word===w);
        const cls=rank===0?'c1':rank===1?'c2':rank===2?'c3':'cn';
        return `<td><span class="chip ${cls}">${sc.score.toFixed(4)}</span></td>`;
      }).join('');
      return `<tr><td style="color:var(--ink);font-weight:500">${w}</td>${cells}</tr>`;
    }).join('')}</tbody></table></div>`;
}

/* ─── Heatmap ────────────────────────────────────── */
function buildHeatmap(modelId){
  const store=embedStore[modelId];
  if(!store) return `<p style="color:var(--ink3);font-size:13px">히트맵 데이터 없음</p>`;
  const words=Object.keys(store);
  if(words.length===0) return '';

  // compute all pairwise cosine
  const scores=[];
  let mn=1,mx=-1;
  for(let i=0;i<words.length;i++){
    scores[i]=[];
    for(let j=0;j<words.length;j++){
      const s=cosine(store[words[i]],store[words[j]]);
      scores[i][j]=s;
      if(i!==j){if(s<mn)mn=s;if(s>mx)mx=s;}
    }
  }

  // color: low=white/cream, high=deep red
  function cellColor(s,i,j){
    if(i===j) return '#2c2416';  // diagonal dark
    const t=Math.max(0,Math.min(1,(s-mn)/(mx-mn+1e-10)));
    // cream #fdf8f0 → red #c0392b
    const r=Math.round(253-(253-192)*t);
    const g=Math.round(248-(248-57)*t);
    const b=Math.round(240-(240-43)*t);
    return `rgb(${r},${g},${b})`;
  }
  function textColor(s,i,j){
    if(i===j) return '#fdf8f0';
    const t=(s-mn)/(mx-mn+1e-10);
    return t>0.6?'#fff':'#2c2416';
  }

  const lbl=MODELS.find(m=>m.id===modelId)?.label||modelId;
  const header=words.map(w=>`<th style="max-width:54px;overflow:hidden;text-overflow:ellipsis" title="${w}">${w.length>7?w.slice(0,6)+'…':w}</th>`).join('');
  const rows=words.map((w,i)=>{
    const cells=words.map((w2,j)=>{
      const s=scores[i][j];
      const bg=cellColor(s,i,j);
      const fg=textColor(s,i,j);
      return `<td style="background:${bg};color:${fg}" title="${w} ↔ ${w2}: ${s.toFixed(4)}">${i===j?'—':s.toFixed(2)}</td>`;
    }).join('');
    return `<tr><th class="row-header">${w}</th>${cells}</tr>`;
  }).join('');

  return `<div class="hmap-wrap">
    <div class="hmap-title">📊 ${lbl} — 단어 간 코사인 유사도 히트맵</div>
    <table class="hmap-table">
      <thead><tr><th class="row-header"></th>${header}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:10px;font-size:11px;color:var(--ink3);font-family:'JetBrains Mono',monospace">
      범위: ${mn.toFixed(4)} (낮음 = 연한색) → ${mx.toFixed(4)} (높음 = 붉은색) · 셀에 마우스를 올리면 정확한 값이 표시됩니다
    </div>
  </div>`;
}

function buildHeatmapTab(){
  const mids=Object.keys(embedStore);
  if(!mids.length) return `<p style="color:var(--ink3);font-size:13px;padding:8px 0">먼저 실행하면 히트맵이 생성됩니다.</p>`;
  const opts=mids.map(mid=>{
    const lbl=MODELS.find(m=>m.id===mid)?.label||mid;
    return `<option value="${mid}">${lbl}</option>`;
  }).join('');
  const first=mids[0];
  return `<div>
    <div class="hmap-sel">
      <label>모델 선택:</label>
      <select id="hmapSel" onchange="renderHeatmap(this.value)">${opts}</select>
    </div>
    <div id="hmapContent">${buildHeatmap(first)}</div>
  </div>`;
}

window.renderHeatmap=(id)=>{
  document.getElementById('hmapContent').innerHTML=buildHeatmap(id);
};

function emptyState(){
  return `<div class="empty-state"><span class="empty-hand">✏️ 아직 결과가 없어요</span>모델을 선택하고 실행 버튼을 눌러주세요.</div>`;
}

function renderResults(){
  const content=document.getElementById('resultContent');
  const tabRow=document.getElementById('tabRow');
  const mids=Object.keys(results);
  if(!mids.length){content.innerHTML=emptyState();tabRow.style.display='none';return;}
  tabRow.style.display='flex';
  if(currentTab==='bar') content.innerHTML=buildBar();
  else if(currentTab==='compare') content.innerHTML=buildCompare();
  else content.innerHTML=buildHeatmapTab();
}

window.showTab=(name,el)=>{
  currentTab=name;
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderResults();
};

/* ─── Run ────────────────────────────────────────── */
window.runTest=async()=>{
  if(!selected.size){alert('모델을 하나 이상 선택하세요.');return;}
  const wA=document.getElementById('wordA').value.trim();
  const wB=document.getElementById('wordB').value.trim();
  const wC=document.getElementById('wordC').value.trim();
  const cands=document.getElementById('candidates').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!wA||!wB||!wC||!cands.length){alert('단어와 후보 목록을 모두 입력하세요.');return;}

  const btn=document.getElementById('runBtn');
  btn.disabled=true; btn.textContent='⏳ 실행 중...';
  results={}; embedStore={}; currentTab='bar';
  document.getElementById('resultContent').innerHTML=`<div class="empty-state"><span class="spinning" style="font-size:24px">◌</span><br><span style="font-size:13px;color:var(--ink2)">계산 중입니다...</span></div>`;
  document.getElementById('tabRow').style.display='none';

  const mids=[...selected];
  const allWords=[wA,wB,wC,...cands];

  for(let i=0;i<mids.length;i++){
    const mid=mids[i];
    const mdef=MODELS.find(m=>m.id===mid);
    setProgress(Math.round(i/mids.length*100),`⚙ ${mdef.label} 처리 중... (${i+1}/${mids.length})`);
    try{
      const ext=await loadModel(mdef);
      setProgress(Math.round(i/mids.length*100),`🔢 ${mdef.label} 임베딩 계산 중...`);

      // embed all words
      const embs={};
      for(const w of allWords){
        embs[w]=await getEmbedding(ext,w);
      }

      // vector arithmetic
      const eA=embs[wA], eB=embs[wB], eC=embs[wC];
      const query=norm(eA.map((v,idx)=>v-eB[idx]+eC[idx]));
      const scores=cands.map(w=>({word:w, score:cosine(query,embs[w])}));
      results[mid]={scores};

      // store candidate embeddings for heatmap (including query words too)
      const hmapWords=[...new Set([wA,wB,wC,...cands])];
      const hmapStore={};
      for(const w of hmapWords) hmapStore[w]=embs[w];
      embedStore[mid]=hmapStore;

    }catch(e){
      results[mid]={error:e.message||String(e)};
    }
  }

  btn.disabled=false; btn.textContent='▶ 선택한 모델로 실행';
  hideProgress();
  renderResults();
};

// init
renderList();
updateFormula();
</script>
